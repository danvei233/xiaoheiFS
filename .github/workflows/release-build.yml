name: Build & Upload Release Assets

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to upload assets to (e.g. v1.2.3)"
        required: true
        type: string

jobs:
  # ========== 准备阶段：解析版本号 ==========
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.value }}
    steps:
      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            echo "value=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

  # ========== Windows 构建任务 ==========
  build-windows:
    name: Build (Windows)
    runs-on: windows-latest
    needs: prepare
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # --- 阶段 1: 构建主程序 ---
      - name: Build main program
        shell: pwsh
        run: |
          Write-Host "[1/3] Build frontend and backend..."
          cmd /c script\build-win.bat

      # --- 阶段 2: 构建插件 ---
      - name: Build plugins
        shell: pwsh
        run: |
          Write-Host "[2/3] Build built-in plugins..."
          Push-Location backend
          
          $pluginList = @(
            "payment/ezpay",
            "payment/wechatpay_v3",
            "payment/alipay_open",
            "sms/alisms",
            "sms/tencent_sms",
            "sms/duanxinbao",
            "kyc/aliyun_kyc",
            "kyc/tencent_kyc",
            "kyc/mangzhu_realname",
            "automation/lightboat",
            "automation/xiaohei_proxy",
            "automation/mofang_openapi"
          )
          
          $env:CGO_ENABLED = "0"
          $env:GOOS = "windows"
          $env:GOARCH = "amd64"
          
          foreach ($id in $pluginList) {
            $pkg = "./plugin-demo/pluginv1/$($id -replace '/', '_')"
            $outDir = Join-Path "plugins/$id" "bin/windows_amd64"
            New-Item -ItemType Directory -Force $outDir | Out-Null
            $outFile = Join-Path $outDir "plugin.exe"
            Write-Host "  Building $id..."
            go build -o $outFile $pkg
          }
          Pop-Location

      # --- 阶段 3: 整理插件目录 ---
      - name: Organize plugins
        shell: pwsh
        run: |
          Write-Host "[3/3] Organize plugins directory..."
          Remove-Item -Recurse -Force build\windows\plugins -ErrorAction SilentlyContinue
          Copy-Item -Path backend\plugins -Destination build\windows\plugins -Recurse -Force

      # --- 打包 ---
      - name: Package
        shell: pwsh
        run: |
          $tag = "${{ needs.prepare.outputs.tag }}"
          Write-Host "Packaging for Windows (tag: $tag)..."
          
          New-Item -ItemType Directory -Force dist | Out-Null
          $zip = "dist/xiaohei-$tag-windows-amd64.zip"
          if (Test-Path $zip) { Remove-Item -Force $zip }
          
          Push-Location build\windows
          $repoRoot = (Resolve-Path ../..).Path
          $dest = Join-Path $repoRoot $zip
          
          Compress-Archive -Path server.exe, static, plugins -DestinationPath $dest -Force
          Pop-Location
          
          $hash = (Get-FileHash $zip -Algorithm SHA256).Hash.ToLower()
          $name = Split-Path $zip -Leaf
          echo "$hash  $name" | Set-Content "$zip.sha256" -NoNewline
          
          Write-Host "Package created: $zip"

      # --- 上传产物 ---
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: dist/*
          retention-days: 1

  # ========== Linux 构建任务 ==========
  build-linux:
    name: Build (Linux)
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # --- 阶段 1: 构建主程序 ---
      - name: Build main program
        shell: bash
        run: |
          echo "[1/3] Build frontend and backend..."
          chmod +x script/build-linux.sh
          ./script/build-linux.sh

      # --- 阶段 2: 构建插件 ---
      - name: Build plugins
        shell: bash
        run: |
          echo "[2/3] Build built-in plugins..."
          cd backend
          
          go env -w CGO_ENABLED=0
          go env -w GOOS=linu
          go env -w GOARCH=amd64
          
          PLUGIN_LIST=(
            "payment/ezpay"
            "payment/wechatpay_v3"
            "payment/alipay_open"
            "sms/alisms"
            "sms/tencent_sms"
            "sms/duanxinbao"
            "kyc/aliyun_kyc"
            "kyc/tencent_kyc"
            "kyc/mangzhu_realname"
            "automation/lightboat"
            "automation/xiaohei_proxy"
            "automation/mofang_openapi"
          )
          
          for id in "${PLUGIN_LIST[@]}"; do
            pkg="./plugin-demo/pluginv1/${id//\//_}"
            out_dir="plugins/$id/bin/linux_amd64"
            mkdir -p "$out_dir"
            echo "  Building $id..."
            go build -o "$out_dir/plugin" "$pkg"
          done
          cd ..

      # --- 阶段 3: 整理插件目录 ---
      - name: Organize plugins
        shell: bash
        run: |
          echo "[3/3] Organize plugins directory..."
          rm -rf build/linux/plugins
          cp -a backend/plugins build/linux/

      # --- 打包 ---
      - name: Package
        shell: bash
        run: |
          tag="${{ needs.prepare.outputs.tag }}"
          echo "Packaging for Linux (tag: $tag)..."
          
          mkdir -p dist
          out="dist/xiaohei-$tag-linux-amd64.tar.gz"
          tar -C build/linux -czf "$out" server static plugins
          
          hash="$(sha256sum "$out" | cut -d' ' -f1)"
          echo "$hash  $(basename "$out")" > "$out.sha256"
          
          echo "Package created: $out"

      # --- 上传产物 ---
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-release
          path: dist/*
          retention-days: 1

  # ========== FreeBSD 构建任务 (交叉编译) ==========
  build-freebsd:
    name: Build (FreeBSD - Cross)
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # --- 阶段 1: 构建主程序 (前端复用 Linux 构建，后端交叉编译) ---
      - name: Build main program
        shell: bash
        run: |
          echo "[1/3] Build frontend and backend (FreeBSD cross)..."
          # 构建前端 (静态资源，所有平台通用)
          chmod +x script/build-linux.sh
          ./script/build-linux.sh
          
          # 交叉编译后端
          echo "  Cross-compiling backend for FreeBSD..."
          cd backend
          go env -w CGO_ENABLED=0
          go env -w GOOS=freebsd
          go env -w GOARCH=amd64
          go build -o ../build/freebsd/server ./cmd/server
          cd ..

      # --- 阶段 2: 构建插件 (交叉编译) ---
      - name: Build plugins
        shell: bash
        run: |
          echo "[2/3] Build built-in plugins (FreeBSD cross)..."
          cd backend
          
          go env -w CGO_ENABLED=0
          go env -w GOOS=freebsd
          go env -w GOARCH=amd64
          
          PLUGIN_LIST=(
            "payment/ezpay"
            "payment/wechatpay_v3"
            "payment/alipay_open"
            "sms/alisms"
            "sms/tencent_sms"
            "sms/duanxinbao"
            "kyc/aliyun_kyc"
            "kyc/tencent_kyc"
            "kyc/mangzhu_realname"
            "automation/lightboat"
            "automation/xiaohei_proxy"
            "automation/mofang_openapi"
          )
          
          for id in "${PLUGIN_LIST[@]}"; do
            pkg="./plugin-demo/pluginv1/${id//\//_}"
            out_dir="plugins/$id/bin/freebsd_amd64"
            mkdir -p "$out_dir"
            echo "  Building $id..."
            go build -o "$out_dir/plugin" "$pkg"
          done
          cd ..

      # --- 阶段 3: 整理插件目录 ---
      - name: Organize plugins
        shell: bash
        run: |
          echo "[3/3] Organize plugins directory..."
          rm -rf build/freebsd/plugins
          cp -a backend/plugins build/freebsd/

      # --- 打包 ---
      - name: Package
        shell: bash
        run: |
          tag="${{ needs.prepare.outputs.tag }}"
          echo "Packaging for FreeBSD (tag: $tag)..."
          
          mkdir -p dist
          out="dist/xiaohei-$tag-freebsd-amd64.tar.gz"
          tar -C build/freebsd -czf "$out" server static plugins
          
          hash="$(sha256sum "$out" | cut -d' ' -f1)"
          echo "$hash  $(basename "$out")" > "$out.sha256"
          
          echo "Package created: $out"

      # --- 上传产物 ---
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: freebsd-release
          path: dist/*
          retention-days: 1

  # ========== 发布阶段：上传到 Release ==========
  release:
    name: Upload to Release
    runs-on: ubuntu-latest
    needs: [prepare, build-windows, build-linux, build-freebsd]
    permissions:
      contents: write
    steps:
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-release
          path: dist

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-release
          path: dist

      - name: Download FreeBSD artifacts
        uses: actions/download-artifact@v4
        with:
          name: freebsd-release
          path: dist

      - name: List artifacts
        shell: bash
        run: |
          echo "Uploading the following files to release ${{ needs.prepare.outputs.tag }}:"
          ls -la dist/

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release upload "${{ needs.prepare.outputs.tag }}" dist/* --clobber --repo "$GITHUB_REPOSITORY"
